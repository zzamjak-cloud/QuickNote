name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: validate tag/version sync
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          if [ "$PKG_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::package.json ($PKG_VERSION) != src-tauri/tauri.conf.json ($TAURI_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag version ($TAG_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install Rust targets for macOS
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      # Vite 는 빌드 시점에 import.meta.env.VITE_* 를 번들에 박는다.
      # 시크릿이 없으면 프로덕션 앱에서 로그인 버튼이 무응답처럼 보인다(Config throw).
      - name: Verify Cognito Vite secrets (desktop bundle)
        shell: bash
        env:
          VITE_COGNITO_REGION: ${{ secrets.VITE_COGNITO_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_HOSTED_UI_DOMAIN: ${{ secrets.VITE_COGNITO_HOSTED_UI_DOMAIN }}
          VITE_COGNITO_DESKTOP_CLIENT_ID: ${{ secrets.VITE_COGNITO_DESKTOP_CLIENT_ID }}
          VITE_AUTH_REDIRECT_DESKTOP: ${{ secrets.VITE_AUTH_REDIRECT_DESKTOP }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${VITE_COGNITO_REGION:-}" ] && missing+=(VITE_COGNITO_REGION)
          [ -z "${VITE_COGNITO_USER_POOL_ID:-}" ] && missing+=(VITE_COGNITO_USER_POOL_ID)
          [ -z "${VITE_COGNITO_HOSTED_UI_DOMAIN:-}" ] && missing+=(VITE_COGNITO_HOSTED_UI_DOMAIN)
          [ -z "${VITE_COGNITO_DESKTOP_CLIENT_ID:-}" ] && missing+=(VITE_COGNITO_DESKTOP_CLIENT_ID)
          [ -z "${VITE_AUTH_REDIRECT_DESKTOP:-}" ] && missing+=(VITE_AUTH_REDIRECT_DESKTOP)
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::데스크톱 릴리스에 필요한 Repository secrets 가 비어 있습니다: ${missing[*]} (CONTRIBUTING 참고)."
            exit 1
          fi

      - name: build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_COGNITO_REGION: ${{ secrets.VITE_COGNITO_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_HOSTED_UI_DOMAIN: ${{ secrets.VITE_COGNITO_HOSTED_UI_DOMAIN }}
          VITE_COGNITO_WEB_CLIENT_ID: ${{ secrets.VITE_COGNITO_WEB_CLIENT_ID }}
          VITE_COGNITO_DESKTOP_CLIENT_ID: ${{ secrets.VITE_COGNITO_DESKTOP_CLIENT_ID }}
          VITE_AUTH_REDIRECT_WEB: ${{ secrets.VITE_AUTH_REDIRECT_WEB }}
          VITE_AUTH_REDIRECT_DESKTOP: ${{ secrets.VITE_AUTH_REDIRECT_DESKTOP }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QuickNote v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload updater fragment for merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --output "updater-fragment-${{ matrix.platform }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: updater-fragment-${{ matrix.platform }}
          path: updater-fragment-${{ matrix.platform }}.json
          if-no-files-found: error

  merge-updater-json:
    name: Merge latest.json (Windows + macOS)
    needs: publish
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: updater-fragment-*
          merge-multiple: true
          path: fragments

      - name: Merge platform entries and upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t files < <(find fragments -type f -name 'updater-fragment-*.json' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No updater fragment json files in fragments/"
            find fragments -type f -ls || true
            exit 1
          fi
          if [ ${#files[@]} -eq 1 ]; then
            cp "${files[0]}" latest.json
          else
            jq -s '
              if length == 1 then .[0]
              else
                .[0] as $base |
                reduce .[1:][] as $x ($base;
                  .platforms = (.platforms * $x.platforms)
                )
              end
            ' "${files[@]}" > latest.json
          fi
          gh release upload "${{ github.ref_name }}" latest.json --clobber --repo "${{ github.repository }}"
