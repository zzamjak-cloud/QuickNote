name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      # 비공개 저장소 전환 후 Actions 분 절감을 위해 의존성 설치를 한 번만 수행한다.
      - name: 앱 의존성 설치
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: 린트
        run: npm run lint

      - name: 타입 검사
        run: npm run typecheck

      - name: infra 의존성 설치
        run: npm ci --prefix infra --prefer-offline --no-audit --no-fund

      - name: 테스트
        run: npm run test:run

      - name: 웹 빌드
        run: npm run build
